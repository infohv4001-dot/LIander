name: Check Storingen
on:
  schedule:
    - cron: '*/15 * * * *' # Draait elke 15 minuten
  workflow_dispatch: # Hiermee kun je het handmatig testen

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python check_storingen.py
